<!DOCTYPE html>
<html>
<head>
<title>Windows UI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="desktop">

    <!-- Right Click Menu -->
    <div id="contextMenu">
        <ul>
            <li>Refresh</li>
            <li>New Folder</li>
            <li>Settings</li>
        </ul>
    </div>

    <!-- Start Menu -->
    <div id="startMenu">
        <p>File Explorer</p>
        <p>Browser</p>
        <p>Settings</p>
    </div>

</div>

<!-- Taskbar -->
<div id="taskbar">
    <button id="startBtn">🪟</button>
</div>

<script src="script.js"></script>
</body>
</html>
